name: Publish to ClawHub

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - name: Build
        run: npm run build

      - name: Publish to ClawHub
        run: |
          npx clawhub login --token "$CLAWHUB_TOKEN"
          npx clawhub package publish . \
            --source-repo lageorgem/slack-thinking-steps \
            --source-commit "$GITHUB_SHA" \
            --json
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
